<style>
      #aria-wrap {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2147483647;
        font-family: -apple-system
        , BlinkMacSystemFont
        , 'Segoe UI'
        , Roboto
        , sans-serif;
        @media(max-width: 750px) {
          bottom: 140px;
          left: 15px;
        }
      }

      #aria-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #9a3412;
        color: #fff;
        border: none;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: auto;
      }

      #aria-box {
        display: none;
        width: 340px;
        height: 510px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        position: absolute;
        bottom: 66px;
        left: 0;
        overflow: hidden;
        flex-direction: column;
      }

      #aria-box.open {
        display: flex;
      }

      #aria-lead {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      #aria-chat {
        display: none;
        flex-direction: column;
        height: 100%;
      }

      #aria-chat.show {
        display: flex;
      }

      #aria-lead.hide {
        display: none;
      }

      #aria-msgs {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        font-size: 14px;
        line-height: 1.6;
      }

      .aria-hdr {
        background: #ffc25b;
        color: #000;
        padding: 14px 16px;
        font-weight: 700;
        font-size: 15px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .aria-close {
        background: transparent;
        border: none;
        color: #000;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
      }

      .aria-inp {
        border: 1px solid #ddd;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        width: 100%;
        box-sizing: border-box;
        outline: none;
        margin-bottom: 10px;
      }

      .aria-inp:focus {
        border-color: #000000;
      }

      .aria-sbtn {
        background: #000000;
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
      }

      #aria-footer {
        padding: 10px 12px;
        border-top: 1px solid #eee;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      #aria-cinput {
        flex: 1;
        border: none;
        outline: none;
        font-size: 14px;
        background: transparent;
      }

      #aria-csend {
        background: #000;
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>

    <div id="aria-wrap">
      <button id="aria-btn" type="button">💬</button>

      <div id="aria-box">
        <!-- Lead Form -->
        <div id="aria-lead">
          <div class="aria-hdr">
            <span>✨ Chat with Sarah</span>
            <button
              class="aria-close"
              type="button"
              aria-label="Close chat">×</button>
          </div>

          <div style="padding:18px;flex:1;overflow-y:auto;">
            <p style="font-size:13px;color:#666;margin:0 0 14px;line-height:1.6;">
              Share your details to connect with Sarah, your crystal healing guide
            </p>

            <input
              type="text"
              id="aria-name"
              class="aria-inp"
              placeholder="Your Name *">
            <input
              type="email"
              id="aria-email"
              class="aria-inp"
              placeholder="Email Address *">
            <input
              type="tel"
              id="aria-phone"
              class="aria-inp"
              placeholder="Phone Number *">

            <div id="aria-err" style="color:#e74c3c;font-size:12px;margin-bottom:10px;display:none;"></div>

            <button
              id="aria-lbtn"
              class="aria-sbtn"
              type="button">Start Chat &rarr;</button>
          </div>
        </div>

        <!-- Chat -->
        <div id="aria-chat">
          <div class="aria-hdr">
            <span>&#10024; Sarah &mdash; Crystal Guide</span>
            <button
              class="aria-close"
              type="button"
              aria-label="Close chat">×</button>
          </div>

          <div id="aria-msgs"></div>

          <div id="aria-footer">
            <input
              type="text"
              id="aria-cinput"
              placeholder="Ask me anything...">
            <button id="aria-csend" type="button">Send</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        'use strict';
      
        var WEBHOOK = 'YOUR_CHAT_WEBHOOK_URL';
        var LEAD_URL = 'YOUR_LEAD_WEBHOOK_URL';
      
        var isOpen = false;
      
        var sid = localStorage.getItem('aria_sid');
        if (!sid) {
          sid = 'aria_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
          localStorage.setItem('aria_sid', sid);
        }
      
        function g(id) {
          return document.getElementById(id);
        }
      
        function esc(s) {
          return String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }
      
        function cleanLine(s) {
          return String(s || '')
            .replace(/\*\*/g, '')
            .replace(/\?\?/g, '')
            .replace(/^[\s•\-*]+/, '')
            .trim();
        }
      
        function cleanMessageText(s) {
          return String(s || '')
            .replace(/\r\n/g, '\n')
            .replace(/[ \t]+\n/g, '\n')
            .replace(/\n[ \t]+/g, '\n')
            .replace(/\n{2,}/g, '\n')
            .trim();
        }
      
        function cleanProductUrl(s) {
          var str = String(s || '').trim();
      
          // Extract clean product URL from accidental markdown format if it appears.
          var markdownUrl = str.match(/\]\((https?:\/\/[^\s"'\)\]]+\/products\/[^\s"'\)\]]+)/i);
      
          if (markdownUrl && markdownUrl[1]) {
            str = markdownUrl[1];
          } else {
            var normalUrl = str.match(/https?:\/\/[^\s"<>\]\)]+\/products\/[^\s"<>\]\)]+/i);
            str = normalUrl && normalUrl[0] ? normalUrl[0] : str;
          }
      
          return str
            .split('](')[0]
            .replace(/^[\[\(]+/g, '')
            .replace(/[\]\)\.,;:]+$/g, '')
            .trim();
        }
      
        function isValidStoreProductUrl(url) {
          url = String(url || '').trim();
      
          if (!url) return false;
          if (!/^https?:\/\//i.test(url)) return false;
          if (/example\.com/i.test(url)) return false;
          if (/placeholder/i.test(url)) return false;
          if (/your-real-store-domain/i.test(url)) return false;
          if (!/\/products\//i.test(url)) return false;
      
          return true;
        }
        function cleanImageUrl(s) {
          var str = String(s || '').trim();
      
          var normalUrl = str.match(/https?:\/\/[^\s"'<>\]\)]+/i);
          str = normalUrl && normalUrl[0] ? normalUrl[0] : str;
      
          return str
            .replace(/^[\[\(]+/g, '')
            .replace(/[\]\)\.,;:]+$/g, '')
            .trim();
        }
      
        function isValidImageUrl(url) {
          url = String(url || '').trim();
      
          if (!url) return false;
          if (!/^https?:\/\//i.test(url)) return false;
          if (/example\.com/i.test(url)) return false;
          if (/placeholder/i.test(url)) return false;
      
          return true;
        }
        var ariaBtn = g('aria-btn');
        if (ariaBtn) {
          ariaBtn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
      
            isOpen = !isOpen;
      
            if (isOpen) {
              g('aria-box').classList.add('open');
      
              if (localStorage.getItem('aria_done') === '1') {
                openChat();
              } else {
                openLead();
              }
            } else {
              g('aria-box').classList.remove('open');
            }
          });
        }
      
        function openLead() {
          g('aria-lead').classList.remove('hide');
          g('aria-chat').classList.remove('show');
        }
      
        function openChat() {
          g('aria-lead').classList.add('hide');
          g('aria-chat').classList.add('show');
      
          var msgs = g('aria-msgs');
      
          if (!msgs.hasChildNodes()) {
            var name = localStorage.getItem('aria_name') || '';
      
            var d = document.createElement('div');
            d.style.cssText = 'margin-bottom:12px;color:#555;';
            d.innerHTML =
              '<b>Sarah:</b> Namaste' +
              (name ? ' ' + esc(name) : '') +
              "! 🙏 I'm Sarah, your crystal healing guide. How can I help you today?";
      
            msgs.appendChild(d);
          }
      
          setTimeout(function () {
            g('aria-cinput').focus();
          }, 50);
        }
      
        var leadBtn = g('aria-lbtn');
        if (leadBtn) {
          leadBtn.addEventListener('click', function (e) {
            e.preventDefault();
      
            var name = g('aria-name').value.trim();
            var email = g('aria-email').value.trim();
            var phone = g('aria-phone').value.trim();
            var err = g('aria-err');
            var btn = g('aria-lbtn');
      
            if (!name) {
              err.textContent = 'Please enter your name.';
              err.style.display = 'block';
              return;
            }
      
            if (!email || email.indexOf('@') < 1) {
              err.textContent = 'Please enter a valid email.';
              err.style.display = 'block';
              return;
            }
      
            if (!phone) {
              err.textContent = 'Please enter your phone number.';
              err.style.display = 'block';
              return;
            }
      
            err.style.display = 'none';
            btn.textContent = 'Please wait...';
            btn.disabled = true;
      
            fetch(LEAD_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: name, email: email, phone: phone, sessionId: sid }),
            }).catch(function () {});
      
            localStorage.setItem('aria_done', '1');
            localStorage.setItem('aria_name', name.split(' ')[0]);
      
            btn.textContent = 'Start Chat →';
            btn.disabled = false;
      
            openChat();
          });
        }
      
        function productCardHtml(product) {
          if (!product || !product.url || !isValidStoreProductUrl(product.url)) return '';
      
          var stockValue = String(product.avail || '')
            .trim()
            .toLowerCase();
      
          var outS = stockValue === 'no';
          var hasImage = product.image && isValidImageUrl(product.image);
      
          var html = '';
      
          html +=
            '<div style="flex:0 0 82%;background:#fff;border:1px solid #e4e4e4;border-radius:12px;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.07);scroll-snap-align:start;">';
      
          if (hasImage) {
            html +=
              '<a href="' +
              esc(product.url) +
              '" target="_blank" rel="noopener noreferrer" style="display:block;text-decoration:none;">' +
              '<img src="' +
              esc(product.image) +
              '" alt="' +
              esc(product.title || 'Product image') +
              '" loading="lazy" style="width:100%;height:auto;object-fit:cover;border-radius:10px;background:#f7f7f7;display:block;">' +
              '</a>';
          }
      
          html +=
            '<div style="font-size:13px;font-weight:700;color:#1a1a2e;line-height:1.4;">' +
            esc(product.title || '') +
            '</div>';
      
          html += '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">';
      
          html += '<span style="font-size:15px;font-weight:800;color:#2c3e50;">' + esc(product.price || '') + '</span>';
      
          html +=
            '<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;' +
            (outS ? 'background:#ffebee;color:#c62828;' : 'background:#e8f5e9;color:#2e7d32;') +
            '">' +
            (outS ? '● Out of Stock' : '● In Stock') +
            '</span>';
      
          html += '</div>';
      
          html +=
            '<a href="' +
            esc(product.url) +
            '" target="_blank" rel="noopener noreferrer" style="display:block;text-align:center;background:#2c3e50;color:#fff;text-decoration:none;padding:9px;border-radius:8px;font-size:12px;font-weight:700;margin-top:4px;">View Product →</a>';
      
          html += '</div>';
      
          return html;
        }
      
        function fmt(text) {
          text = String(text || '')
            .replace(/\?\?\s*/g, '')
            .replace(/^\?\s*/gm, '')
            .trim();
      
          var hasProductBlocks = /PRODUCT_CARD_START/i.test(text);
      
          // Product cards are rendered ONLY from structured PRODUCT_CARD_START blocks.
          // Emoji product format is intentionally not parsed to avoid wrong title/URL pairing.
          if (!hasProductBlocks) {
            return esc(cleanMessageText(text))
              .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
              .replace(/\n{2,}/g, '<br><br>')
              .replace(/\n/g, '<br>');
          }
      
          var blockRegex = /PRODUCT_CARD_START([\s\S]*?)PRODUCT_CARD_END/gi;
          var match;
          var products = [];
      
          // Do not suppress duplicate product cards. If the customer asks again, cards should render again.
          while ((match = blockRegex.exec(text)) !== null) {
            var block = match[1] || '';
      
            var nameMatch = block.match(/^\s*Name:\s*(.+)$/im);
            var priceMatch = block.match(/^\s*Price:\s*(.+)$/im);
            var stockMatch = block.match(/^\s*Stock:\s*(.+)$/im);
            var urlMatch = block.match(/^\s*URL:\s*(.+)$/im);
            var imageMatch = block.match(/^\s*Image URL:\s*(.+)$/im);
      
            var title = nameMatch && nameMatch[1] ? cleanLine(nameMatch[1]) : '';
            var price = priceMatch && priceMatch[1] ? cleanLine(priceMatch[1]) : '';
            var avail = stockMatch && stockMatch[1] ? cleanLine(stockMatch[1]) : 'In Stock';
            var url = urlMatch && urlMatch[1] ? cleanProductUrl(urlMatch[1]) : '';
            var image = imageMatch && imageMatch[1] ? cleanImageUrl(imageMatch[1]) : '';
      
            if (!title) continue;
            if (!isValidStoreProductUrl(url)) continue;
      
            products.push({
              title: title,
              price: price,
              avail: avail,
              url: url,
              image: image,
            });
          }
      
          var messageText = cleanMessageText(text.replace(blockRegex, '').trim());
          var html = '';
      
          if (messageText) {
            html +=
              '<div style="font-size:13px;color:#444;margin-bottom:6px;line-height:1.45;">' +
              esc(messageText)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n{2,}/g, '<br>')
                .replace(/\n/g, '<br>') +
              '</div>';
          }
      
          if (!products.length) {
            return (
              html ||
              esc(cleanMessageText(text))
                .replace(/\n{2,}/g, '<br><br>')
                .replace(/\n/g, '<br>')
            );
          }
      
          html +=
            '<div style="display:flex;gap:10px;overflow-x:auto;padding:4px 2px 10px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;">';
      
          products.slice(0, 5).forEach(function (product) {
            html += productCardHtml(product);
          });
      
          html += '</div>';
      
          return html;
        }
      
        function send() {
          var inp = g('aria-cinput');
          var msgs = g('aria-msgs');
          var txt = inp.value.trim();
      
          if (!txt) return;
      
          var u = document.createElement('div');
          u.style.cssText = 'margin-bottom:8px;font-size:14px;color:#555;';
          u.innerHTML = '<b>You:</b> ' + esc(txt);
      
          msgs.appendChild(u);
      
          inp.value = '';
      
          var ty = document.createElement('div');
          ty.id = 'aria-ty';
          ty.style.cssText = 'margin-bottom:8px;font-size:13px;color:#aaa;';
          ty.innerHTML = '<b>Sarah:</b> typing...';
      
          msgs.appendChild(ty);
          msgs.scrollTop = msgs.scrollHeight;
      
          fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: txt, sessionId: sid }),
          })
            .then(function (r) {
              if (!r.ok) {
                throw new Error('Webhook error: ' + r.status);
              }
      
              return r.json();
            })
            .then(function (data) {
              var t = g('aria-ty');
              if (t) t.remove();
      
              var output = data.output || data.message || data.response || 'Sorry, please try again.';
      
              var a = document.createElement('div');
              a.style.cssText = 'margin-bottom:12px;font-size:14px;line-height:1.7;';
      
              try {
                a.innerHTML = '<b>Sarah:</b><br>' + fmt(output);
              } catch (renderError) {
                a.innerHTML =
                  '<b>Sarah:</b><br>' +
                  esc(cleanMessageText(output))
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n{2,}/g, '<br><br>')
                    .replace(/\n/g, '<br>');
              }
              msgs.appendChild(a);
              msgs.scrollTop = msgs.scrollHeight;
            })
            .catch(function (error) {
              var t = g('aria-ty');
              if (t) t.remove();
      
              var e = document.createElement('div');
              e.style.cssText = 'margin-bottom:8px;font-size:13px;color:red;';
              e.innerHTML = '<b>Error:</b> Connection failed.';
      
              msgs.appendChild(e);
              msgs.scrollTop = msgs.scrollHeight;
            });
        }
      
        var sendBtn = g('aria-csend');
        if (sendBtn) {
          sendBtn.addEventListener('click', function (e) {
            e.preventDefault();
            send();
          });
        }
      
        var chatInput = g('aria-cinput');
        if (chatInput) {
          chatInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              send();
            }
          });
        }
      
        document.querySelectorAll('.aria-close').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
      
            isOpen = false;
            g('aria-box').classList.remove('open');
          });
        });
      })();
    </script>
